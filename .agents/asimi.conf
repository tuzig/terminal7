# Asimi Default Configuration File
# This file contains all available configuration options with their default values.
# All options are commented out by default. Uncomment and modify as needed.
#
# Configuration files are loaded in the following order (later sources override earlier ones):
# 1. Built-in defaults
# 2. User config: ~/.config/asimi/asimi.conf
# 3. Project config: .agents/asimi.conf
# 4. Environment variables: ASIMI_* (e.g., ASIMI_LLM_PROVIDER)

[storage]
# Path to SQLite database for storing sessions and history
#database_path = "~/.local/share/asimi/asimi.sqlite"

[logging]
# Logging level: debug, info, warn, error
#level = "info"
# Logging format: text, json
#format = "text"

[ui]
# Enable markdown rendering in the terminal
#markdown_enabled = true
# Debounce time for Ctrl+C presses (duration string, e.g., "100ms")
#ctrl_c_debounce_time = "200ms"
# Window time for detecting double Ctrl+C presses to quit (duration string)
#ctrl_c_window_time = "2000ms"
# Height the prompt grows to when in multiline mode
#prompt_expanded_height = 10

[llm]
# LLM provider: openai, anthropic, azure, gemini, openrouter, bedrock, or custom
# Note: bedrock requires AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY environment variables
#provider = "anthropic"
# Model name to use (provider-specific)
# Examples:
#   OpenAI: gpt-4, gpt-4o, gpt-4o-mini, o1, o1-mini
#   Anthropic: claude-3-5-sonnet-20241022, claude-3-opus-20240229
#   Azure: gpt-4, gpt-4o (deployment name)
#   Gemini: gemini-2.0-flash, gemini-1.5-pro
#   OpenRouter: openai/gpt-4o, anthropic/claude-3.5-sonnet
#   Bedrock: anthropic.claude-3-sonnet-20240229-v1:0, anthropic.claude-3-5-sonnet-20241022-v2:0
#model = ""
# API key for the LLM provider
# Note: It's recommended to use environment variables or keyring instead
# Environment variables: OPENAI_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY
#api_key = ""
# Base URL for API requests (for custom endpoints or proxies)
#base_url = ""
# Maximum thinking tokens for extended thinking models
#max_thinking_tokens = 0
# Maximum number of conversation turns before stopping
#max_turns = 0
# Disable context sanitization (advanced users only)
#disable_sanitization = false
# Enable experimental model support
#experimental_models = false
# OAuth access token (managed by `asimi login`)
#auth_token = ""
# OAuth refresh token (managed by `asimi login`)
#refresh_token = ""
# Maximum tool output size in bytes; outputs larger than this are truncated
#max_tool_output = 50000
# Timeout for non-streaming requests, in seconds
#request_timeout_seconds = 300
# Idle timeout per chunk during streaming responses, in seconds
#stream_idle_timeout_seconds = 600
# Retries on transient connect/network errors (e.g. IPv6 fallback, brief timeouts).
# Each retry uses bifrost's exponential backoff (500ms → 5s).
#max_retries = 3

[history]
# Enable persistent session history
#enabled = true
# Maximum number of sessions to keep
#max_sessions = 50
# Maximum age of sessions in days (older sessions are deleted)
#max_age_days = 30
# Limit number of sessions shown in list (0 = no limit)
#list_limit = 0
# Automatically save sessions during conversation
#auto_save = false
# Auto-save interval in seconds
#save_interval = 300

[session]
# Enable session persistence
#enabled = true
# Maximum number of sessions to keep
#max_sessions = 50
# Maximum age of sessions in days
#max_age_days = 30
# Limit number of sessions shown in list (0 = no limit)
#list_limit = 0
# Automatically save sessions during conversation
#auto_save = true
# Auto-save interval in seconds
#save_interval = 300
# Project context file name (default: AGENTS.md, can be CLAUDE.md)
# This is auto-detected by :init if CLAUDE.md exists
#agents_file = "AGENTS.md"

[shogunate]
# Username for edict scoping (default: OS username)
#username = ""
# Project slug for edict scoping (default: working directory name, overridden by git remote slug)
project = "tuzig/terminal7"

[sandbox]
# Container image name (default: localhost/asimi-sandbox-<project>:latest)
image_name = ""
# Timeout for shell commands in minutes
#timeout_minutes = 10
# Disable cleanup of containers on exit (for debugging)
#no_cleanup = false
# Allow falling back to host execution if container is unavailable
#allow_host_fallback = false
# List of regex patterns for commands that should run on the host instead of in container
# These commands will require user approval before execution (unless in safe_run_on_host)
run_on_host = ["^gh\\s", "^podman\\s"]
# Commands matching these patterns can run on host without approval
safe_run_on_host = ["^gh\\s+(issue|pr)\\s+(view|list)", "^podman\\s+ps", "^just test"]
platform_overlays = ["node_modules", "yarn.lock"]
# Host environment variables to forward into the container
# Useful for passing tokens/credentials needed during install (e.g., GITLAB_TOKEN)
#passthrough_env = ["GITLAB_TOKEN"]
# Additional mount points for the container
# Each mount has a source (host path) and destination (container path)
#[[sandbox.additional_mounts]]
#source = "/host/path"
#destination = "/container/path"
